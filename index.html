<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="refresh" content="0; url=./inventario-pedidos-local/">
  <title>IsiVoltPro V13</title>
  <style>
    :root{--navy:#071E3D;--gold:#FFC928;--line:#dbe3ef;--bg:#f1f5f9}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,var(--navy),#0B2A55);color:white;padding:20px}
    .card{max-width:520px;width:100%;background:white;color:#0f172a;border-radius:28px;padding:28px;box-shadow:0 18px 50px #0005;text-align:center}
    .logo{width:64px;height:64px;margin:0 auto 14px;border-radius:22px;background:var(--navy);border:3px solid var(--gold);display:grid;place-items:center;color:var(--gold);font-weight:1000;font-size:24px}
    h1{margin:0;font-size:26px;color:var(--navy)}
    p{color:#64748b;line-height:1.5}
    a{display:inline-flex;align-items:center;justify-content:center;margin-top:10px;background:var(--gold);color:var(--navy);font-weight:1000;text-decoration:none;padding:14px 18px;border-radius:16px}
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">IV</div>
    <h1>IsiVoltPro V13</h1>
    <p>Redirigiendo a la demo de pedidos de almacén...</p>
    <a href="./inventario-pedidos-local/">Abrir pedidos de almacén</a>
  </main>
</body>
</html>
